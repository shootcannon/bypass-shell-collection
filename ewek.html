<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacked By Groovy</title>

    <meta name="keywords" content="Groovy1337, Groovy, Dongak Community, DCE GANK, DCE">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-row {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .telegram-logo-left {
            width: 80px;
            height: auto;
            display: block;
            border-radius: 16px;
        }

        .telegram-logo-right {
            width: 80px;
            height: 80px;
            display: block;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.08);
        }

        .logo-container {
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .logo-img {
            width: 300px;
            height: auto;
            display: block;
        }

        .main-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-align: center;
        }

        .bloody-text {
            font-family: 'Nosifer', sans-serif;
            color: #8b0000;
            text-shadow: 0 0 5px rgba(139, 0, 0, 0.6);
        }

        .subtitle {
            font-size: 14px;
            font-weight: 400;
            color: #ffffff;
            margin-bottom: 35px;
            text-align: center;
        }

        .audio-container {
            width: 100%;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }

        .custom-audio {
            width: 85%;
            max-width: 320px;
            border-radius: 50px;
            background-color: #ffffff;
        }

        .divider {
            width: 100%;
            border: 0;
            border-top: 1px solid #1a1a1a;
            margin: 0;
        }

        .quote-container {
            padding: 25px 10px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .quote-text {
            font-size: 13px;
            font-style: italic;
            line-height: 1.6;
            color: #dddddd;
            font-weight: 400;
            text-align: center;
        }

        .origin {
            font-style: normal;
            font-weight: 700;
            color: #ffffff;
        }

        .footer-credits {
            padding-top: 30px;
            width: 100%;
            text-align: center;
        }

        .footer-credits p {
            font-size: 12px;
            color: #777777;
            letter-spacing: 0.5px;
            text-align: center;
        }

        @media (max-width: 360px) {
            .main-title {
                font-size: 20px;
            }
            .quote-text {
                font-size: 11px;
            }
            .telegram-logo-left {
                width: 60px;
            }
            .telegram-logo-right {
                width: 60px;
                height: 60px;
            }
            .logo-img {
                width: 220px;
            }
            .logo-row {
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
      
        <div class="logo-row">
            <img src="https://i.ibb.co.com/RGFzksh4/telegram-peer-photo-size-5-6151972621080269206-1-0-0.jpg" alt="Telegram Left" class="telegram-logo-left">
            <img src="https://i.ibb.co.com/F4V0bCvR/telegram-peer-photo-size-5-6192688129362300759-1-0-0.jpg" alt="Telegram Right" class="telegram-logo-right">
        </div>

        <div class="logo-container">
            <img src="https://i.ibb.co.com/zVWDDVkn/9392153.jpg" alt="Hacked By Groovy" class="logo-img">
        </div>
        <h4 class="main-title">Hacked By <span class="bloody-text">Groovy</span></h4>

        <hr class="divider">

        <div class="quote-container">
            <p class="quote-text">
                "Sometimes<br>we ain't the bad guy by choice.<br>Life just gave us a reason to be."<br><br>"People judge the scars they can see,<br>but never the wounds that caused them."
            </p>
        </div>

        <hr class="divider">

        <footer class="footer-credits">
            <p>=-[ SkyDev1337, Nisof 1001, Ciio, Lawliet, Abyss, Winter, Joyaa, Johen ]-=<br>And Dongak Community People</p>
        </footer>
    </div>

</body>
</html>
